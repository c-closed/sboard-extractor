name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build main exe (self-contained)
        shell: cmd
        run: |
          dotnet publish SboardExtractor.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Build updater
        shell: cmd
        run: |
          dotnet publish Updater.csproj -c Release -r win-x64 --self-contained true -o publish_tmp
          copy /y "publish_tmp\Updater.exe" "publish\Updater.exe"
          copy /y "publish_tmp\Updater.dll" "publish\Updater.dll"
          copy /y "publish_tmp\Updater.pdb" "publish\Updater.pdb"
          copy /y "publish_tmp\Updater.deps.json" "publish\Updater.deps.json"
          copy /y "publish_tmp\Updater.runtimeconfig.json" "publish\Updater.runtimeconfig.json"
          rmdir /s /q publish_tmp

      - name: Install Inno Setup
        shell: powershell
        run: |
          winget install --id JRSoftware.InnoSetup -e --accept-package-agreements 2>&1
          $isccDir = Resolve-Path "$env:LOCALAPPDATA\Programs\Inno Setup*" | Select-Object -ExpandProperty Path
          echo "ISCC_DIR=$isccDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Setup.exe
        shell: cmd
        run: |
          "%ISCC_DIR%\ISCC.exe" installer.iss

      - name: Write package script
        shell: pwsh
        run: |
          @'
          $items = @(Get-ChildItem -Path "publish" -File -Recurse)
          Get-ChildItem -Path "." -Filter "_Sboard*.cmd" -File | ForEach-Object { $items += $_ }
          Get-ChildItem -Path "." -Filter "install.cmd" -File | ForEach-Object { $items += $_ }
          Get-ChildItem -Path "." -Filter "Sboard*.msi" -File | ForEach-Object { $items += $_ }
          Get-ChildItem -Path "." -Filter "Sboard*_Setup.exe" -File | ForEach-Object { $items += $_ }
          Compress-Archive -LiteralPath $items.FullName -DestinationPath SboardExtractor_Updated.zip -Force
          '@ | Out-File -FilePath package.ps1 -Encoding utf8

      - name: Package
        shell: pwsh
        run: ./package.ps1

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SboardExtractor_Updated.zip
            Sboard*_Setup.exe
          generate_release_notes: true
