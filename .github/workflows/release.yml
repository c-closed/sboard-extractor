name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build main exe (self-contained)
        shell: cmd
        run: |
          dotnet publish SboardExtractor.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          $paths = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $found = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($found) {
            $dir = Split-Path $found -Parent
            "ISCC_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8
          } else {
            throw "ISCC.exe not found"
          }

      - name: Build Setup.exe
        shell: cmd
        run: |
          "%ISCC_DIR%\ISCC.exe" installer.iss

      - name: Write package script
        shell: pwsh
        run: |
          @'
          $items = @(Get-ChildItem -Path "publish" -File -Recurse)
          Compress-Archive -LiteralPath $items.FullName -DestinationPath SboardExtractor_Updated.zip -Force
          '@ | Out-File -FilePath package.ps1 -Encoding utf8

      - name: Package
        shell: pwsh
        run: ./package.ps1

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SboardExtractor_Updated.zip
            Sboard*_Setup.exe
          generate_release_notes: true
